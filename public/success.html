<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlung erfolgreich - TaghiWaves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: #12121a;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 240, 255, 0.1);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00f0ff, #b829dd);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #00f0ff, #b829dd);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 240, 255, 0.3);
        }
        .home-link {
            display: block;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .home-link:hover {
            color: #00f0ff;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h1>Zahlung erfolgreich!</h1>
        <p>Vielen Dank für deinen Kauf. Dein Dokument ist bereit zum Download.</p>
        
        <a href="#" class="download-btn" id="downloadBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Jetzt herunterladen
        </a>
        
        <a href="/" class="home-link">← Zurück zur Startseite</a>
    </div>

    <script>
        // Hole Session-ID aus URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        
        if (sessionId) {
            // Download-Link mit Session-ID
            document.getElementById('downloadBtn').href = `/api/download/mixing-eq-guide?session_id=${sessionId}`;
        } else {
            document.getElementById('downloadBtn').style.display = 'none';
            document.querySelector('p').textContent = 'Fehler: Keine gültige Session gefunden.';
        }
    </script>
</body>
</html>
